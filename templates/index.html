<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConvoAI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    :root {
      --bg:#0c0c10; --surface:#1c1c22; --surface2:#2a2a32;
      --border:#4a4a55; --text:#ffffff; --text-dim:#9ca3af; --text-ghost:#52525b;
      --green:#4ade80; --green-bg:rgba(74,222,128,0.13);
      --red:#f87171; --red-bg:rgba(248,113,113,0.16);
      --side-a:#a5b4fc; --side-b:#f9a8d4;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:grid;grid-template-rows:auto 1fr}

    .header{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
    .logo{font-size:15px;font-weight:700}.logo span{color:var(--side-a)}
    .status{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:8px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--text-ghost)}
    .dot.on{background:var(--green)}.dot.rec{background:var(--red);animation:pulse 1s infinite}
    @keyframes pulse{50%{opacity:.3}}

    .layout{display:grid;grid-template-columns:1fr 260px;overflow:hidden;height:calc(100vh - 49px)}
    .main-area{display:flex;flex-direction:column;overflow:hidden;position:relative}

    /* Canvas */
    .canvas{flex:1;overflow-y:auto;padding:32px 40px;font-size:15px;line-height:2;min-height:0}
    .canvas .empty{color:var(--text-ghost);font-style:italic}
    .canvas .side-hdr{display:block;margin-top:16px;margin-bottom:4px}
    .canvas .side-hdr:first-child{margin-top:0}
    .canvas .side-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:4px}
    .canvas .side-tag.a{background:rgba(165,180,252,.15);color:var(--side-a)}
    .canvas .side-tag.b{background:rgba(249,168,212,.15);color:var(--side-b)}

    /* Word animation */
    .w{display:inline;animation:wordIn .3s ease-out}
    @keyframes wordIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

    /* Claim highlights */
    .cl{border-radius:3px;padding:1px 3px;position:relative;cursor:default;transition:background .4s}
    .cl.true{background:var(--green-bg);border-bottom:2px solid var(--green);animation:hlIn .5s}
    .cl.false{background:var(--red-bg);border:1px solid rgba(248,113,113,.4);border-bottom:2.5px solid var(--red);padding:1px 4px;animation:hlIn .5s}
    @keyframes hlIn{from{background:transparent;border-color:transparent}}

    /* Tooltip */
    .cl .tip{display:none;position:absolute;bottom:calc(100% + 8px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.5;color:var(--text-dim);width:300px;z-index:10;box-shadow:0 8px 24px rgba(0,0,0,.5)}
    .cl .tip .tv{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
    .cl .tip .tv.true{color:var(--green)}.cl .tip .tv.false{color:var(--red)}
    .cl:hover .tip{display:block}

    /* Loading overlay */
    .loading{display:none;position:absolute;inset:0;background:rgba(12,12,16,.9);z-index:20;align-items:center;justify-content:center;flex-direction:column;gap:16px}
    .loading.show{display:flex}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--side-a);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:14px;color:var(--text-dim)}

    /* Controls */
    .controls{padding:14px 24px;display:flex;align-items:center;gap:14px;border-top:1px solid var(--border)}
    .rec-btn{width:48px;height:48px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .rec-btn .inner{width:20px;height:20px;border-radius:50%;background:var(--red);transition:all .15s}
    .rec-btn:hover{border-color:var(--red)}.rec-btn.on{border-color:var(--red);background:rgba(248,113,113,.08)}.rec-btn.on .inner{border-radius:4px;width:16px;height:16px}
    .side-switch{display:flex;background:var(--surface);border-radius:8px;padding:3px;gap:2px}
    .side-switch button{padding:7px 18px;border:none;border-radius:6px;background:transparent;color:var(--text-dim);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all .12s}
    .side-switch button.sel-a{background:var(--side-a);color:#fff}.side-switch button.sel-b{background:var(--side-b);color:#fff}
    .vbtn{padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--text-dim);font-family:inherit;font-size:12px;cursor:pointer}
    .vbtn:hover{background:var(--surface2);color:var(--text)}
    .ctrl-spacer{flex:1}
    .hk{font-size:11px;color:var(--text-ghost)}.hk kbd{padding:2px 6px;background:var(--surface2);border-radius:4px;font-family:inherit;font-size:10px}
    .vstatus{font-size:11px;color:var(--side-a);display:flex;align-items:center;gap:6px;opacity:0;transition:opacity .3s}
    .vstatus.active{opacity:1}
    .vstatus .vs-dot{width:6px;height:6px;border-radius:50%;background:var(--side-a);animation:pulse 1s infinite}

    /* Sidebar */
    .sidebar{border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:16px;overflow-y:auto}
    .sc{padding:16px;background:var(--surface);border-radius:10px;border:1px solid var(--border)}
    .sc .nm{font-size:14px;font-weight:600;margin-bottom:14px;cursor:text;outline:none;border-bottom:1px dashed transparent;display:inline-block;min-width:60px}
    .sc .nm:hover{border-bottom-color:var(--text-dim)}
    .sc.ca .nm{color:var(--side-a)}.sc.cb .nm{color:var(--side-b)}
    .bn{font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1}
    .bl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    .sts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
    .st{font-size:12px;color:var(--text-dim)}.st strong{color:var(--text)}.st strong.g{color:var(--green)}.st strong.r{color:var(--red)}
    .ab{height:4px;background:var(--surface2);border-radius:2px;margin-top:12px;overflow:hidden}
    .af{height:100%;border-radius:2px;transition:width .3s}
    .sc.ca .af{background:var(--side-a)}.sc.cb .af{background:var(--side-b)}
    .report-link{display:none;margin-top:10px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--side-a);cursor:pointer;text-align:center}
    .report-link:hover{background:var(--border)}
    .report-link.show{display:block}
    .sa{margin-top:auto;display:flex;gap:8px}
    .sa button{flex:1;padding:8px;font-size:11px;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);cursor:pointer}
    .sa button:hover{color:var(--text);background:var(--surface2)}
    .sa .end{color:var(--red);border-color:rgba(248,113,113,.3)}

    /* Modal */
    .mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center}
    .mbg.open{display:flex}
    .mdl{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
    .mdl h2{font-size:16px;text-align:center;margin-bottom:16px}
    .mdl .banner{text-align:center;font-size:20px;font-weight:700;padding:14px;border-radius:8px;background:var(--bg);margin-bottom:16px}
    .mdl .report-body{font-size:13px;line-height:1.7;color:var(--text-dim);margin:12px 0;padding:12px;background:var(--bg);border-radius:8px}
    .mdl .claim-list{margin:8px 0}
    .mdl .cl-item{padding:6px 10px;margin:4px 0;border-radius:4px;font-size:12px;line-height:1.5}
    .mdl .cl-item.true{background:var(--green-bg);border-left:3px solid var(--green)}
    .mdl .cl-item.false{background:var(--red-bg);border-left:3px solid var(--red)}
    .mdl .cl-item .reason{color:var(--text-dim);font-size:11px;margin-top:2px}
    .mdl .close-btn{width:100%;margin-top:16px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer}
  </style>
</head>
<body>

<div class="header">
  <div class="logo"><span>convo</span>ai</div>
  <div class="status"><div class="dot" id="dot"></div><span id="st">connecting...</span></div>
</div>

<div class="layout">
  <div class="main-area">
    <div class="canvas" id="canvas">
      <span class="empty">Start recording — text appears here with live fact-check highlights.</span>
    </div>
    <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">Finalizing report...</div></div>

    <div class="controls">
      <button class="rec-btn" id="recBtn" onclick="toggleRec()"><div class="inner"></div></button>
      <div class="side-switch">
        <button id="swA" class="sel-a" onclick="pick('a')">A</button>
        <button id="swB" onclick="pick('b')">B</button>
      </div>
      <button class="vbtn" onclick="verifyNow()">Verify</button>
      <div class="vstatus" id="vstatus"><div class="vs-dot"></div><span id="vstatusText">verifying...</span></div>
      <div class="ctrl-spacer"></div>
      <div class="hk"><kbd>space</kbd> rec &nbsp;<kbd>v</kbd> verify</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sc ca">
      <div class="nm" contenteditable id="nA" spellcheck="false">Side A</div>
      <div class="bn" id="accA">0%</div><div class="bl">accuracy</div>
      <div class="ab"><div class="af" id="barA" style="width:0%"></div></div>
      <div class="sts"><div class="st"><strong class="g" id="supA">0</strong> true</div><div class="st"><strong class="r" id="refA">0</strong> false</div></div>
      <div class="report-link" id="repA" onclick="showReport('a')">View Report</div>
    </div>
    <div class="sc cb">
      <div class="nm" contenteditable id="nB" spellcheck="false">Side B</div>
      <div class="bn" id="accB">0%</div><div class="bl">accuracy</div>
      <div class="ab"><div class="af" id="barB" style="width:0%"></div></div>
      <div class="sts"><div class="st"><strong class="g" id="supB">0</strong> true</div><div class="st"><strong class="r" id="refB">0</strong> false</div></div>
      <div class="report-link" id="repB" onclick="showReport('b')">View Report</div>
    </div>
    <div class="sa">
      <button onclick="doReset()">Reset</button>
      <button onclick="doEndTurn()">End Turn</button>
      <button class="end" onclick="doEndDebate()">Finish</button>
    </div>
  </div>
</div>

<div class="mbg" id="modal">
  <div class="mdl"><h2 id="mTitle"></h2><div id="mBody"></div><button class="close-btn" onclick="closeModal()">Close</button></div>
</div>

<script>
const socket = io();
let side = 'a', rec = false, actx, src, proc;
let reports = { a: null, b: null };

socket.on('connect', () => { document.getElementById('dot').className='dot on'; document.getElementById('st').textContent='ready'; syncNames(); });
socket.on('disconnect', () => { document.getElementById('dot').className='dot'; document.getElementById('st').textContent='disconnected'; });

document.getElementById('nA').addEventListener('blur', syncNames);
document.getElementById('nB').addEventListener('blur', syncNames);
document.getElementById('nA').addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();e.target.blur()}});
document.getElementById('nB').addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();e.target.blur()}});

function syncNames() {
  const a=document.getElementById('nA').textContent.trim()||'Side A';
  const b=document.getElementById('nB').textContent.trim()||'Side B';
  document.getElementById('swA').textContent=a;
  document.getElementById('swB').textContent=b;
  socket.emit('set_sides',{side_a:a,side_b:b});
}

// ── Transcript sync — always shows full text ──
socket.on('transcript_sync', d => {
  const canvas = document.getElementById('canvas');
  const empty = canvas.querySelector('.empty');
  if (empty) empty.remove();

  // Ensure side header exists
  let hdr = document.getElementById('hdr-'+d.side);
  if (!hdr) {
    hdr = document.createElement('div');
    hdr.id = 'hdr-'+d.side;
    hdr.className = 'side-hdr';
    const name = document.getElementById(d.side==='a'?'nA':'nB').textContent;
    hdr.innerHTML = `<span class="side-tag ${d.side}">${name}</span>`;
    canvas.appendChild(hdr);
  }

  // Get or create the text container
  let container = document.getElementById('txt-'+d.side);
  if (!container) {
    container = document.createElement('span');
    container.id = 'txt-'+d.side;
    canvas.appendChild(container);
  }

  // Update with full transcript (preserves any highlights already applied)
  // Only append new words to avoid destroying highlights
  const currentLen = container.textContent.length;
  const fullLen = d.full.length;
  if (fullLen > currentLen && d.new) {
    const words = d.new.split(/\s+/);
    for (const word of words) {
      const span = document.createElement('span');
      span.className = 'w';
      span.textContent = word + ' ';
      container.appendChild(span);
    }
  }

  canvas.scrollTop = canvas.scrollHeight;
});

// ── Highlights ──
let allClaims = { a: [], b: [] };

socket.on('highlight', d => {
  console.log('HIGHLIGHT:', d.claim.verdict, d.claim.text.substring(0,40));
  allClaims[d.side].push(d.claim);
  if (d.scores) updateScores(d.scores);
});

socket.on('verify_done', d => {
  console.log('VERIFY_DONE, applying highlights:', allClaims[d.side].length);
  applyHighlights(d.side);
});

function applyHighlights(s) {
  const container = document.getElementById('txt-'+s);
  if (!container) return;

  const claims = allClaims[s];
  if (!claims.length) return;

  // Normalize text: collapse whitespace for matching
  const plainText = container.textContent.replace(/\s+/g, ' ').trim();
  let html = escapeHtml(plainText);

  // Find and highlight each claim
  const positioned = [];
  for (const c of claims) {
    if (c.verdict !== 'supported' && c.verdict !== 'refuted') continue;
    const normalized = c.text.replace(/\s+/g, ' ').trim();
    const idx = html.toLowerCase().indexOf(normalized.toLowerCase());
    if (idx !== -1) {
      positioned.push({ ...c, idx, len: normalized.length });
    } else {
      // Try matching first 4 words as fallback
      const words = normalized.split(' ').slice(0, 4).join(' ');
      const idx2 = html.toLowerCase().indexOf(words.toLowerCase());
      if (idx2 !== -1) {
        // Find end of sentence from this point
        let end = idx2 + normalized.length;
        if (end > html.length) end = Math.min(html.length, idx2 + 80);
        positioned.push({ ...c, idx: idx2, len: end - idx2 });
      }
    }
  }

  // Sort reverse to preserve indices
  positioned.sort((a, b) => b.idx - a.idx);

  for (const c of positioned) {
    const before = html.substring(0, c.idx);
    const match = html.substring(c.idx, c.idx + c.len);
    const after = html.substring(c.idx + c.len);
    const reason = (c.reason||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    const v = c.verdict;
    const label = v === 'supported' ? 'Verified True' : 'False Claim';
    const tip = `<span class="tip"><span class="tv ${v === 'supported' ? 'true' : 'false'}">${label}</span><br>${reason}</span>`;
    const cls = v === 'supported' ? 'true' : 'false';
    html = before + `<span class="cl ${cls}">${match}${tip}</span>` + after;
  }

  container.innerHTML = html;
  console.log('Highlights applied:', positioned.length, 'of', claims.length);
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Loading overlay ──
socket.on('loading', d => {
  document.getElementById('loadingText').textContent = d.msg || 'Loading...';
  document.getElementById('loading').classList.add('show');
});

// ── Turn report ──
socket.on('turn_report', d => {
  document.getElementById('loading').classList.remove('show');

  reports[d.side] = d;
  const repBtn = document.getElementById(d.side==='a'?'repA':'repB');
  repBtn.classList.add('show');

  if (d.scores) updateScores({[d.side]: d.summary});
  showReportModal(d);
});

// ── Debate end ──
socket.on('debate_summary', d => {
  document.getElementById('mTitle').textContent = 'Debate Results';
  document.getElementById('mBody').innerHTML = `<div class="banner">${d.winner==='tie'?'Tie':'Winner: '+d.winner_name}</div>`;
  document.getElementById('modal').classList.add('open');
});

socket.on('verify_status', d => {
  const el = document.getElementById('vstatus');
  const txt = document.getElementById('vstatusText');
  if (d.active) { el.classList.add('active'); txt.textContent = d.msg || 'verifying...'; }
  else { el.classList.remove('active'); }
});

socket.on('debate_reset', () => {
  document.getElementById('canvas').innerHTML = '<span class="empty">Start recording — text appears here with live fact-check highlights.</span>';
  reports = {a:null,b:null};
  document.getElementById('repA').classList.remove('show');
  document.getElementById('repB').classList.remove('show');
  resetScores();
});

// ── Functions ──
function pick(s) { side=s; socket.emit('set_active_side',{side:s}); document.getElementById('swA').className=s==='a'?'sel-a':''; document.getElementById('swB').className=s==='b'?'sel-b':''; }

function toggleRec() { rec ? stopRec() : startRec(); }

async function startRec() {
  if (!socket.connected) { return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { sampleRate: 16000, channelCount: 1, echoCancellation: true, noiseSuppression: true }
    });
    actx = new AudioContext({ sampleRate: 16000 });
    src = actx.createMediaStreamSource(stream);
    proc = actx.createScriptProcessor(4096, 1, 1);

    let buf = [], silStart = null, chunkStart = Date.now();

    proc.onaudioprocess = e => {
      const inp = e.inputBuffer.getChannelData(0);
      const s16 = new Int16Array(inp.length);
      for (let i = 0; i < inp.length; i++) s16[i] = Math.max(-1, Math.min(1, inp[i])) * 0x7FFF;
      for (let i = 0; i < s16.length; i++) buf.push(s16[i]);

      const rms = Math.sqrt(inp.reduce((s, x) => s + x * x, 0) / inp.length);
      const now = Date.now(), elapsed = now - chunkStart;

      // 4s max or 600ms silence after 1.5s
      if (elapsed >= 4000 && buf.length > 0) {
        sendAudio(buf); buf = []; chunkStart = now; silStart = null;
      } else if (rms < 0.01) {
        if (!silStart) silStart = now;
        if (now - silStart > 600 && elapsed >= 1500 && buf.length > 0) {
          sendAudio(buf); buf = []; chunkStart = now; silStart = null;
        }
      } else { silStart = null; }
    };

    src.connect(proc); proc.connect(actx.destination);
    rec = true;
    document.getElementById('recBtn').classList.add('on');
    document.getElementById('dot').className = 'dot rec';
    document.getElementById('st').textContent = 'recording';
  } catch(e) { alert('Microphone access required.'); }
}

let sending = false;
function sendAudio(buf) {
  if (sending) return; // drop chunk if previous still processing
  sending = true;
  const bytes = new Uint8Array(new Int16Array(buf).buffer);
  socket.emit('audio_chunk', { audio: bytes, side, sampleRate: actx.sampleRate }, () => { sending = false; });
  // Fallback reset in case callback doesn't fire
  setTimeout(() => { sending = false; }, 5000);
}

function stopRec() {
  proc?.disconnect(); src?.disconnect(); actx?.close();
  proc = src = actx = null; rec = false;
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('dot').className = 'dot on';
  document.getElementById('st').textContent = 'ready';
}

// Server sends transcribed text back
socket.on('new_text', d => {
  addTextToCanvas(d.side, d.text);
});

function addTextToCanvas(s, text) {
  const canvas = document.getElementById('canvas');
  const empty = canvas.querySelector('.empty');
  if (empty) empty.remove();

  let hdr = document.getElementById('hdr-'+s);
  if (!hdr) {
    hdr = document.createElement('div');
    hdr.id = 'hdr-'+s;
    hdr.className = 'side-hdr';
    hdr.innerHTML = `<span class="side-tag ${s}">${document.getElementById(s==='a'?'nA':'nB').textContent}</span>`;
    canvas.appendChild(hdr);
  }

  let container = document.getElementById('txt-'+s);
  if (!container) {
    container = document.createElement('span');
    container.id = 'txt-'+s;
    canvas.appendChild(container);
  }

  text.split(/\s+/).forEach(word => {
    if (!word) return;
    const span = document.createElement('span');
    span.className = 'w';
    span.textContent = word + ' ';
    container.appendChild(span);
  });
  canvas.scrollTop = canvas.scrollHeight;
}

function verifyNow() { socket.emit('verify_now',{side}); }

function updateScores(sc) {
  for (const s of ['a','b']) {
    if (!sc[s]) continue;
    const S = s.toUpperCase();
    document.getElementById('acc'+S).textContent=sc[s].accuracy+'%';
    document.getElementById('bar'+S).style.width=sc[s].accuracy+'%';
    document.getElementById('sup'+S).textContent=sc[s].supported;
    document.getElementById('ref'+S).textContent=sc[s].refuted;
  }
}
function resetScores(){['A','B'].forEach(s=>{document.getElementById('acc'+s).textContent='0%';document.getElementById('bar'+s).style.width='0%';document.getElementById('sup'+s).textContent='0';document.getElementById('ref'+s).textContent='0'})}

function doReset(){if(rec)stopRec();socket.emit('reset')}
function doEndTurn(){if(rec)stopRec();socket.emit('end_side',{side})}
function doEndDebate(){if(rec)stopRec();socket.emit('end_debate')}

function showReport(s) { if(reports[s]) showReportModal(reports[s]); }

function showReportModal(d) {
  const name = document.getElementById(d.side==='a'?'nA':'nB').textContent;
  document.getElementById('mTitle').textContent = name + ' — Report';

  let html = `<div class="banner">${d.summary.accuracy}% accuracy</div>`;

  if (d.report) {
    html += `<div class="report-body">${d.report}</div>`;
  }

  const trueClaims = (d.claims||[]).filter(c=>c.verdict==='true');
  const falseClaims = (d.claims||[]).filter(c=>c.verdict==='false');

  if (trueClaims.length) {
    html += '<div style="font-size:12px;color:var(--text-dim);margin-top:12px">Verified True:</div><div class="claim-list">';
    trueClaims.forEach(c => { html += `<div class="cl-item true">"${c.text}"<div class="reason">${c.reason||''}</div></div>`; });
    html += '</div>';
  }
  if (falseClaims.length) {
    html += '<div style="font-size:12px;color:var(--text-dim);margin-top:12px">False Claims:</div><div class="claim-list">';
    falseClaims.forEach(c => { html += `<div class="cl-item false">"${c.text}"<div class="reason">${c.reason||''}</div></div>`; });
    html += '</div>';
  }

  document.getElementById('mBody').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open')}

document.addEventListener('keydown', e => {
  if(['INPUT','TEXTAREA'].includes(document.activeElement.tagName)||document.activeElement.isContentEditable||document.getElementById('modal').classList.contains('open'))return;
  if(e.code==='Space'&&!e.repeat){e.preventDefault();toggleRec()}
  if(e.code==='KeyV'&&!e.repeat){e.preventDefault();verifyNow()}
});
</script>
</body>
</html>
